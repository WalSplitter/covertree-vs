name: Code Quality

on:
  pull_request:
    branches: [main]

jobs:
  format:
    name: Format Check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET (for dotnet-format)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Check C# formatting
        run: dotnet format src/CoverTree.VS.csproj --verify-no-changes --severity warn
        continue-on-error: true

  build-check:
    name: Build (PR check)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: msbuild src/CoverTree.VS.csproj /t:Restore /p:Configuration=Debug

      - name: Build
        run: >
          msbuild src/CoverTree.VS.csproj
          /p:Configuration=Debug
          /p:DeployExtension=false
          /m
          /warnaserror
